<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophy AI Education - 구글 로그인 시스템</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase JS (모듈형) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.signInWithPopup = signInWithPopup;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.getFirestore = getFirestore;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.serverTimestamp = serverTimestamp;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.orderBy = orderBy;
        window.limit = limit;
    </script>
    <style>
        :root {
            --primary-color: #e67e22;
            --primary-dark: #d35400;
            --secondary-color: #f39c12;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --background-light: #f8f9fa;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-hover: rgba(0, 0, 0, 0.15);
            --gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--background-light);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: var(--white);
            box-shadow: 0 2px 10px var(--shadow);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 1rem;
            background: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Main Content */
        .main-content {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .auth-section {
            background: var(--white);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .auth-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        .auth-subtitle {
            color: var(--text-light);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .google-login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: var(--white);
            color: var(--text-dark);
            padding: 1rem 2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            width: 100%;
        }

        .google-login-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-hover);
        }

        .google-icon {
            width: 24px;
            height: 24px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%234285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="%2334A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="%23FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="%23EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>') no-repeat center;
            background-size: contain;
        }

        .logout-btn {
            background: var(--error-color);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        /* User Profile Form */
        .profile-form {
            display: none;
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            margin: 2rem 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .interests-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .interest-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .interest-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .submit-btn {
            background: var(--gradient);
            color: var(--white);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            padding: 2rem 0;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--shadow-hover);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .users-table {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow);
            overflow: hidden;
        }

        .table-header {
            background: var(--gradient);
            color: var(--white);
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .users-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .user-item {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr auto;
            gap: 1rem;
            align-items: center;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-item:hover {
            background: var(--background-light);
        }

        .user-email {
            color: var(--accent-color);
            font-weight: 600;
        }

        .user-company {
            color: var(--text-light);
        }

        .user-interests {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .user-date {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 1rem 0;
            }

            .auth-section {
                padding: 2rem;
                margin: 1rem;
            }

            .auth-title {
                font-size: 2rem;
            }

            .user-item {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                text-align: left;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
            }
        }

        /* Loading states */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: var(--success-color);
            color: var(--white);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: none;
        }

        .error-message {
            background: var(--error-color);
            color: var(--white);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav container">
            <a href="#" class="logo">Philosophy AI Education</a>
            <div class="user-menu">
                <div class="user-info" id="userInfo">
                    <img id="userAvatar" class="user-avatar" src="" alt="User Avatar">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> 로그아웃
                    </button>
                </div>
                <div id="loginSection">
                    <button id="googleLoginBtn" class="google-login-btn">
                        <div class="google-icon"></div>
                        구글 계정으로 로그인
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- 로그인 화면 -->
            <div id="authSection" class="auth-section">
                <h1 class="auth-title">환영합니다!</h1>
                <p class="auth-subtitle">Philosophy AI Education에 가입하여<br>최신 AI 교육 소식을 받아보세요</p>
                
                <button id="googleLogin" class="google-login-btn">
                    <div class="google-icon"></div>
                    구글 계정으로 시작하기
                </button>

                <div id="authMessage" class="success-message"></div>
                <div id="authError" class="error-message"></div>
            </div>

            <!-- 프로필 완성 폼 -->
            <div id="profileForm" class="profile-form">
                <h2>프로필 정보 입력</h2>
                <p style="color: var(--text-light); margin-bottom: 2rem;">
                    맞춤형 교육 추천을 위해 추가 정보를 입력해주세요.
                </p>

                <form id="userProfileForm">
                    <div class="form-group">
                        <label for="profileEmail">연락처 이메일</label>
                        <input type="email" id="profileEmail" name="profileEmail" placeholder="example@email.com">
                    </div>

                    <div class="form-group">
                        <label for="company">회사/소속</label>
                        <input type="text" id="company" name="company" placeholder="회사명 또는 소속 기관">
                    </div>

                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="marketingAgreed" name="marketingAgreed">
                            마케팅 정보 수신에 동의합니다
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" id="profileSubmitBtn">
                        프로필 저장하기
                    </button>
                </form>

                <div id="profileMessage" class="success-message"></div>
                <div id="profileError" class="error-message"></div>
            </div>

            <!-- 관리자 대시보드 -->
            <div id="adminDashboard" class="admin-dashboard">
                <div class="dashboard-header">
                    <h1 class="dashboard-title">관리자 대시보드</h1>
                    <p style="color: var(--text-light);">가입자 현황 및 통계 정보</p>
                </div>

                <div class="stats-grid" id="statsGrid">
                    <!-- 동적으로 생성됨 -->
                </div>

                <div class="users-table">
                    <div class="table-header">
                        <i class="fas fa-users"></i> 가입자 목록
                    </div>
                    <div class="users-list" id="usersList">
                        <!-- 동적으로 생성됨 -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Firebase 설정 (philosophyaiedumain 프로젝트)
        const firebaseConfig = {
            projectId: "philosophyaiedumain",
            appId: "1:791707583638:web:b86d59d52a20330baaaeb7",
            storageBucket: "philosophyaiedumain.firebasestorage.app",
            apiKey: "AIzaSyBylDxamogm1_g2URVxGQFz_c05pOWqjEI",
            authDomain: "philosophyaiedumain.firebaseapp.com",
            messagingSenderId: "791707583638",
            measurementId: "G-KWCY47PZWB"
        };

        let app, auth, db;
        
        // DOM 요소들
        const authSection = document.getElementById('authSection');
        const profileForm = document.getElementById('profileForm');
        const adminDashboard = document.getElementById('adminDashboard');
        const userInfo = document.getElementById('userInfo');
        const loginSection = document.getElementById('loginSection');
        const authMessage = document.getElementById('authMessage');
        const authError = document.getElementById('authError');

        let currentUser = null;


        document.addEventListener('DOMContentLoaded', function() {
            // Firebase 로드가 완료될 때까지 대기 (모듈이 글로벌 윈도우에 바인딩됨)
            let attempts = 0;
            const initInterval = setInterval(() => {
                if (window.initializeApp) {
                    clearInterval(initInterval);
                    app = window.initializeApp(firebaseConfig);
                    auth = window.getAuth(app);
                    db = window.getFirestore(app);
                    setupEventListeners();
                    loadDashboardDataIfAdmin();
                    
                    window.onAuthStateChanged(auth, (user) => {
                        handleAuthStateChange(user);
                    });
                }
                attempts++;
                if (attempts > 50) { // 5초
                    clearInterval(initInterval);
                    showError('Firebase 초기화에 실패했습니다. 페이지를 새로고침해주세요.');
                }
            }, 100);
        });

        function setupEventListeners() {
            document.getElementById('googleLogin')?.addEventListener('click', handleGoogleLogin);
            document.getElementById('googleLoginBtn')?.addEventListener('click', handleGoogleLogin);
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
            document.getElementById('userProfileForm')?.addEventListener('submit', handleProfileSubmit);
        }

        async function loadDashboardDataIfAdmin() {
            if (currentUser && (currentUser.email === 'admin@example.com' || currentUser.email === 'hwangeu@gmail.com')) {
                await showAdminDashboard();
            }
        }

        async function handleGoogleLogin() {
            if (!auth) return;
            try {
                const provider = new window.GoogleAuthProvider();
                await window.signInWithPopup(auth, provider);
            } catch (error) {
                console.error('로그인 에러:', error);
                showError('로그인 중 오류가 발생했습니다.');
            }
        }

        async function handleLogout() {
            if (!auth) return;
            try {
                await window.signOut(auth);
                currentUser = null;
                showLoginScreen();
            } catch (error) {
                console.error('로그아웃 에러:', error);
            }
        }

        async function handleAuthStateChange(user) {
            if (user) {
                currentUser = user;
                updateUserInfo(user);
                await checkUser(user);
            } else {
                currentUser = null;
                showLoginScreen();
            }
        }

        async function checkUser(user) {
            try {
                // Check if admin
                if (user.email === 'admin@example.com' || user.email === 'hwangeu@gmail.com') {
                    await showAdminDashboard();
                    return;
                }

                const docRef = window.doc(db, 'users', user.uid);
                const docSnap = await window.getDoc(docRef);

                if (docSnap.exists() && docSnap.data().profileCompleted) {
                    showWelcomeScreen(docSnap.data());
                } else {
                    showProfileForm(user);
                }
            } catch (error) {
                console.error('사용자 확인 오류:', error);
                showError('사용자 정보를 확인하는 중 오류가 발생했습니다.');
            }
        }

        async function handleProfileSubmit(e) {
            e.preventDefault();
            if (!currentUser) return;

            const submitBtn = document.getElementById('profileSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div> 처리 중...';

            try {
                const formData = new FormData(e.target);
                const profileData = {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    profileEmail: formData.get('profileEmail'),
                    company: formData.get('company'),
                    marketingAgreed: formData.get('marketingAgreed') === 'on',
                    profileCompleted: true,
                    updatedAt: window.serverTimestamp()
                };

                // Create document only if it doesn't exist, else merge
                const userRef = window.doc(db, 'users', currentUser.uid);
                const docSnap = await window.getDoc(userRef);
                
                if (!docSnap.exists()) {
                    profileData.createdAt = window.serverTimestamp();
                }
                
                await window.setDoc(userRef, profileData, { merge: true });

                showMessage('프로필이 성공적으로 저장되었습니다.', 'profileMessage');
                setTimeout(() => showWelcomeScreen(profileData), 1500);

            } catch (error) {
                console.error('프로필 저장 오류:', error);
                showError(error.message, 'profileError');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '프로필 저장하기';
            }
        }

        async function showAdminDashboard() {
            if (!db) return;
            try {
                hideAllScreens();
                adminDashboard.style.display = 'block';
                
                const usersRef = window.collection(db, 'users');
                const q = window.query(usersRef, window.orderBy('createdAt', 'desc'), window.limit(20));
                const querySnapshot = await window.getDocs(q);
                
                let users = [];
                let totalMarketing = 0;
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    users.push(data);
                    if (data.marketingAgreed) totalMarketing++;
                });

                const stats = {
                    total_users: users.length, // 간이 통계
                    new_users_today: 0,
                    new_users_this_week: 0,
                    new_users_this_month: 0,
                    marketing_agreed_users: totalMarketing,
                    total_companies: new Set(users.map(u => u.company).filter(c => c)).size
                };

                renderStatsCards(stats);
                renderUsersList(users);

            } catch (error) {
                console.error('대시보드 로드 오류:', error);
                showError('대시보드를 로드할 수 없습니다: ' + error.message);
            }
        }

        function renderStatsCards(stats) {
            const statsGrid = document.getElementById('statsGrid');
            if (!statsGrid || !stats) return;

            const statsCards = [
                { label: '최근 가입자', value: stats.total_users, icon: 'fas fa-users' },
                { label: '마케팅 동의', value: stats.marketing_agreed_users, icon: 'fas fa-envelope' },
                { label: '등록 회사', value: stats.total_companies, icon: 'fas fa-building' }
            ];

            statsGrid.innerHTML = statsCards.map(stat => `
                <div class="stat-card">
                    <i class="${stat.icon}" style="color: var(--primary-color); font-size: 2rem; margin-bottom: 1rem;"></i>
                    <span class="stat-number">${stat.value || 0}</span>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

        function renderUsersList(users) {
            const usersList = document.getElementById('usersList');
            if (!usersList) return;

            if (!users || users.length === 0) {
                usersList.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-light);">아직 가입자가 없습니다.</div>';
                return;
            }

            usersList.innerHTML = users.map(user => `
                <div class="user-item">
                    <div>
                        <div class="user-email">${user.email || '이메일 없음'}</div>
                        <div style="font-weight: 600; color: var(--text-dark);">${user.name || '이름 없음'}</div>
                    </div>
                    <div>
                        <div class="user-company">${user.company || '미입력'}</div>
                        <div class="user-email" style="font-size: 0.8rem; color: var(--text-light);">${user.profileEmail || '연락처 없음'}</div>
                    </div>
                    <div class="user-date">${user.createdAt ? new Date(user.createdAt.toDate ? user.createdAt.toDate() : user.createdAt).toLocaleDateString('ko-KR') : '날짜 없음'}</div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.9rem; color: var(--text-light);">
                            ${user.marketingAgreed ? '마케팅 동의' : '마케팅 비동의'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showLoginScreen() {
            hideAllScreens();
            authSection.style.display = 'block';
            userInfo.style.display = 'none';
            loginSection.style.display = 'block';
        }

        function showProfileForm(user) {
            hideAllScreens();
            profileForm.style.display = 'block';
            userInfo.style.display = 'flex';
            loginSection.style.display = 'none';
        }

        function showWelcomeScreen(profile) {
            hideAllScreens();
            authSection.style.display = 'block';
            authSection.innerHTML = `
                <h1 class="auth-title">환영합니다, ${profile.name}님!</h1>
                <p class="auth-subtitle">로그인이 완료되었습니다.<br>곧 Philosophy AI Education의 최신 소식을 받아보실 수 있습니다.</p>
                <div style="margin-top: 2rem;">
                    <a href="/" style="color: var(--primary-color); text-decoration: none;">← 메인 페이지로 돌아가기</a>
                </div>
            `;
            userInfo.style.display = 'flex';
            loginSection.style.display = 'none';
        }

        function hideAllScreens() {
            authSection.style.display = 'none';
            profileForm.style.display = 'none';
            adminDashboard.style.display = 'none';
        }

        function updateUserInfo(user) {
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');

            if (userAvatar && user.photoURL) {
                userAvatar.src = user.photoURL;
                userAvatar.alt = user.displayName || user.email;
            }

            if (userName) {
                userName.textContent = user.displayName || user.email.split('@')[0];
            }
        }

        function showMessage(message, elementId = 'authMessage') {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.style.display = 'block';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 3000);
            }
        }

        function showError(message, elementId = 'authError') {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.style.display = 'block';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
